version: '3.5'

services:
  postgres-server:
    image: postgres:15-alpine
    container_name: zabbix-postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - /data/zabbix/postgres:/var/lib/postgresql/data
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-latest
    container_name: zabbix-server
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_SERVER_HOST=postgres-server
      - ZBX_CACHESIZE=512M
      - ZBX_LOGTYPE=file
    volumes:
      - /data/zabbix/server/alertscripts:/usr/lib/zabbix/alertscripts:ro
      - /data/zabbix/server/externalscripts:/usr/lib/zabbix/externalscripts:ro
      - /data/zabbix/server/export:/var/lib/zabbix/export:rw
      - /data/zabbix/log/zabbix-server:/var/log/zabbix:rw
    ports:
      - "10051:10051"
    depends_on:
      postgres-server:
        condition: service_healthy
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/10051'"]
      interval: 10s
      timeout: 5s
      retries: 3

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:ubuntu-latest
    container_name: zabbix-web
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_SERVER_HOST=postgres-server
      - ZBX_SERVER_HOST=zabbix-server
      - PHP_TZ=Asia/Ho_Chi_Minh
    ports:
      - "80:8080"
      - "443:8443"
    depends_on:
      postgres-server:
        condition: service_healthy
      zabbix-server:
        condition: service_healthy
    volumes:
      - /data/zabbix/log/zabbix-web:/var/log/nginx:rw
    networks:
      - zabbix-net